<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6학년 1학기 영어 퀴즈 🌟</title>
    <style>
        :root {
            --primary-color: #ffeb3b;
            --secondary-color: #4caf50;
            --error-color: #f44336;
            --bg-color: #f0f4f8;
        }

        body {
            font-family: 'Nanum Gothic', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        #quiz-container {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .mascot {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .progress {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 20px;
        }

        .question {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .options {
            display: grid;
            gap: 10px;
        }

        button.option {
            background: #fff;
            border: 2px solid #ddd;
            padding: 15px;
            border-radius: 12px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.2s;
        }

        button.option:hover {
            background: #f9f9f9;
        }

        button.correct {
            background-color: var(--secondary-color) !important;
            color: white;
            border-color: var(--secondary-color);
        }

        button.wrong {
            background-color: var(--error-color) !important;
            color: white;
            border-color: var(--error-color);
        }

        #explanation {
            margin-top: 20px;
            padding: 15px;
            background: #e3f2fd;
            border-radius: 10px;
            display: none;
            text-align: left;
            font-size: 0.95em;
        }

        #next-btn, #start-btn {
            margin-top: 20px;
            background: #2196f3;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.1em;
            cursor: pointer;
            width: 100%;
        }

        #result-screen {
            display: none;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="start-screen">
        <div class="mascot">🐶</div>
        <h1>영어 퀴즈 대모험!</h1>
        <p>6학년 1학기 내용을 복습해봐요!</p>
        <p style="font-size: 0.8em; color: #888;">(시작 버튼을 누르면 배경음악이 나옵니다)</p>
        <button id="start-btn" onclick="startQuiz()">시작하기!</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="mascot">✨</div>
        <div class="progress" id="progress">문제 1 / 7</div>
        <div class="question" id="question">질문이 여기에 표시됩니다.</div>
        <div class="options" id="options"></div>
        <div id="explanation"></div>
        <button id="next-btn" class="hidden" onclick="nextQuestion()">다음 문제로</button>
    </div>

    <div id="result-screen">
        <div class="mascot">🏆</div>
        <h2>참 잘했어요!</h2>
        <div id="final-score" style="font-size: 2em; margin: 20px 0;">0 / 7</div>
        <button id="restart-btn" onclick="location.reload()">다시 하기</button>
    </div>
</div>

<audio id="bgm" loop preload="auto">
    <source src="https://actions.google.com/sounds/v1/foley/wind_chime_vibrant.ogg" type="audio/ogg">
</audio>

<script>
    const questions = [
        {
            q: "질문에 알맞은 대답은? 'Where are you from?'",
            a: ["I'm from Korea.", "I'm 13 years old.", "I'm happy.", "I'm a student."],
            correct: 0,
            exp: "출신 국가를 묻는 질문에는 'I'm from + 나라'로 답합니다."
        },
        {
            q: "다음에 들어갈 말은? 'What ______ are you in?' (너는 몇 학년이니?)",
            a: ["year", "class", "grade", "level"],
            correct: 2,
            exp: "학년을 물을 때는 'grade'라는 표현을 사용합니다."
        },
        {
            q: "'나는 어제 축구를 했다'의 올바른 영어 표현은?",
            a: ["I play soccer yesterday.", "I played soccer yesterday.", "I playing soccer yesterday.", "I plays soccer yesterday."],
            correct: 1,
            exp: "과거의 일은 동사 뒤에 -ed를 붙여 과거형(played)으로 표현합니다."
        },
        {
            q: "'I want to be a pilot.'의 뜻은 무엇일까요?",
            a: ["나는 조종사를 좋아한다.", "나는 조종사가 되고 싶다.", "나는 조종사를 보았다.", "나는 조종사다."],
            correct: 1,
            exp: "want to be ~는 '~가 되고 싶다'는 장래희망을 나타냅니다."
        },
        {
            q: "'박물관은 어디에 있나요?'라고 물을 때 적절한 문장은?",
            a: ["Where is the museum?", "How is the museum?", "What is the museum?", "Who is the museum?"],
            correct: 0,
            exp: "장소의 위치를 물을 때는 'Where is ~?'를 사용합니다."
        },
        {
            q: "비교하는 문장 중 옳은 것은? (기린이 사자보다 크다)",
            a: ["A giraffe is tall than a lion.", "A giraffe is more tall than a lion.", "A giraffe is taller than a lion.", "A giraffe is tallest than a lion."],
            correct: 2,
            exp: "두 대상을 비교할 때는 '형용사-er + than' 형태를 사용합니다."
        },
        {
            q: "'도와줄까?'라고 제안할 때 쓰는 표현은?",
            a: ["May I help you?", "Can you help me?", "What are you doing?", "I am sorry."],
            correct: 0,
            exp: "상대방을 도와주겠다고 정중히 제안할 때 'May I help you?'를 씁니다."
        }
    ];

    let currentIdx = 0;
    let score = 0;
    let answered = false;
    const bgm = document.getElementById('bgm');

    function startQuiz() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        
        // 브라우저 정책 상 사용자 클릭 후 재생 가능
        bgm.volume = 0.5; // 볼륨 50%
        bgm.play().catch(error => {
            console.log("자동 재생이 차단되었습니다. 클릭 후 재생됩니다.", error);
        });
        
        showQuestion();
    }

    function showQuestion() {
        const qData = questions[currentIdx];
        document.getElementById('progress').innerText = `문제 ${currentIdx + 1} / ${questions.length}`;
        document.getElementById('question').innerText = qData.q;
        document.getElementById('explanation').style.display = 'none';
        document.getElementById('next-btn').classList.add('hidden');
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        qData.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i, btn);
            optionsDiv.appendChild(btn);
        });
        answered = false;
    }

    function checkAnswer(idx, btn) {
        if(answered) return;
        answered = true;

        const correctIdx = questions[currentIdx].correct;
        const allButtons = document.querySelectorAll('.option');

        if(idx === correctIdx) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            allButtons[correctIdx].classList.add('correct');
        }

        const expDiv = document.getElementById('explanation');
        expDiv.innerText = `💡 해설: ${questions[currentIdx].exp}`;
        expDiv.style.display = 'block';
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
        currentIdx++;
        if(currentIdx < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = `${score} / ${questions.length} 점`;
        if(score === questions.length) {
            document.querySelector('#result-screen .mascot').innerText = "👑";
        }
    }
</script>

</body>
</html>
