<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6학년 1학기 영어 퀴즈 🌟</title>
    <style>
        :root {
            --primary: #FFD93D;
            --secondary: #6BCB77;
            --danger: #FF6B6B;
            --accent: #4D96FF;
            --bg: #F9F9F9;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #app {
            background: white;
            width: 90%;
            max-width: 450px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .mascot { font-size: 60px; margin-bottom: 10px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .progress-bar {
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s;
        }

        .question {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 25px;
            word-break: keep-all;
        }

        .options { display: flex; flex-direction: column; gap: 12px; }

        .btn-opt {
            background: white;
            border: 2px solid #eee;
            padding: 15px;
            border-radius: 15px;
            font-size: 1.05em;
            cursor: pointer;
            transition: 0.2s;
            outline: none;
        }

        .btn-opt:active { transform: scale(0.98); }

        .correct { background-color: var(--secondary) !important; color: white; border-color: var(--secondary); }
        .wrong { background-color: var(--danger) !important; color: white; border-color: var(--danger); }

        #explanation {
            margin-top: 20px;
            padding: 15px;
            background: #f0f7ff;
            border-radius: 12px;
            font-size: 0.95em;
            color: #333;
            display: none;
            text-align: left;
            border-left: 5px solid var(--accent);
        }

        .btn-main {
            margin-top: 25px;
            background: var(--accent);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-size: 1.1em;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        #result-screen { display: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="app">
    <div id="start-screen">
        <div class="mascot">🐥</div>
        <h1 style="color: #444;">영어 퀴즈 대모험</h1>
        <p style="color: #666; margin-bottom: 30px;">6학년 1학기 영어, 준비됐나요?</p>
        <button class="btn-main" onclick="initGame()">🎶 음악과 함께 시작!</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="progress-bar"><div class="progress-fill" id="p-fill"></div></div>
        <div class="mascot" id="q-mascot">📝</div>
        <div class="question" id="q-text"></div>
        <div class="options" id="options"></div>
        <div id="explanation"></div>
        <button id="next-btn" class="btn-main hidden" onclick="goNext()">다음 문제로 ➔</button>
    </div>

    <div id="result-screen">
        <div class="mascot" id="res-mascot">🌈</div>
        <h2 id="res-title">참 잘했어요!</h2>
        <div style="font-size: 2.5em; font-weight: bold; margin: 20px 0; color: var(--accent);" id="final-score">0 / 7</div>
        <button class="btn-main" onclick="location.reload()">다시 도전하기</button>
    </div>
</div>

<audio id="bgm" loop preload="auto">
    <source src="https://www.chosic.com/wp-content/uploads/2021/04/Funny-Song.mp3" type="audio/mpeg">
</audio>

<script>
    const questions = [
        { q: "Where are you from? 에 대한 알맞은 답은?", a: ["I'm from Korea.", "I'm 13 years old.", "I'm happy.", "Yes, I am."], c: 0, e: "출신을 묻는 질문에는 'I'm from + 장소'를 씁니다." },
        { q: "What ______ are you in? (너 몇 학년이니?)", a: ["year", "class", "grade", "level"], c: 2, e: "학년을 물을 때는 'grade'를 사용합니다." },
        { q: "나는 어제 축구를 했다. (빈칸 채우기)\nI _______ soccer yesterday.", a: ["play", "plays", "playing", "played"], c: 3, e: "과거의 일은 동사 뒤에 -ed를 붙여 과거형으로 말해요." },
        { q: "I want to be a pilot. 의 뜻은?", a: ["조종사를 좋아한다.", "조종사가 되고 싶다.", "조종사를 본 적 있다.", "조종사를 안다."], c: 1, e: "'want to be ~'는 장래희망(~이 되고 싶다)을 뜻해요." },
        { q: "박물관 위치를 물어볼 때 알맞은 표현은?", a: ["Where is the museum?", "How is the museum?", "What is the museum?", "Who is the museum?"], c: 0, e: "장소를 물을 때는 'Where'로 시작합니다." },
        { q: "사과가 포도보다 크다. (비교)\nAn apple is ______ than a grape.", a: ["big", "bigger", "biggest", "more big"], c: 1, e: "두 개를 비교할 때는 형용사 뒤에 -er을 붙여 'taller', 'bigger'처럼 써요." },
        { q: "상대방을 도와줄까 제안하는 말은?", a: ["May I help you?", "Can you help me?", "What's up?", "No, thank you."], c: 0, e: "정중히 도움을 제안할 때는 'May I help you?'라고 합니다." }
    ];

    let current = 0;
    let score = 0;
    let isAnswered = false;
    const bgm = document.getElementById('bgm');

    function initGame() {
        // 브라우저 정책상 클릭 이벤트 내부에서 오디오 컨텍스트를 재개해야 함
        bgm.volume = 0.4;
        const playPromise = bgm.play();
        
        if (playPromise !== undefined) {
            playPromise.catch(error => {
                console.log("Autoplay blocked. Retrying...");
                // 수동 재생을 위한 재시도 로직
                document.body.addEventListener('click', () => bgm.play(), { once: true });
            });
        }

        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        isAnswered = false;
        const data = questions[current];
        document.getElementById('p-fill').style.width = ((current + 1) / questions.length * 100) + '%';
        document.getElementById('q-text').innerText = data.q;
        document.getElementById('explanation').style.display = 'none';
        document.getElementById('next-btn').classList.add('hidden');
        
        const optionsArea = document.getElementById('options');
        optionsArea.innerHTML = '';
        
        data.a.forEach((txt, i) => {
            const b = document.createElement('button');
            b.className = 'btn-opt';
            b.innerText = txt;
            b.onclick = () => select(i, b);
            optionsArea.appendChild(b);
        });
    }

    function select(idx, btn) {
        if(isAnswered) return;
        isAnswered = true;
        const correctIdx = questions[current].c;
        const allBtns = document.querySelectorAll('.btn-opt');

        if(idx === correctIdx) {
            btn.classList.add('correct');
            score++;
            document.getElementById('q-mascot').innerText = "🎈";
        } else {
            btn.classList.add('wrong');
            allBtns[correctIdx].classList.add('correct');
            document.getElementById('q-mascot').innerText = "😮";
        }

        const exp = document.getElementById('explanation');
        exp.innerText = `💡 Tip: ${questions[current].e}`;
        exp.style.display = 'block';
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function goNext() {
        current++;
        if(current < questions.length) {
            document.getElementById('q-mascot').innerText = "📝";
            renderQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = `${score} / ${questions.length} 점`;
        
        const resMascot = document.getElementById('res-mascot');
        const resTitle = document.getElementById('res-title');
        
        if(score === questions.length) {
            resMascot.innerText = "👑";
            resTitle.innerText = "와우! 만점이에요!";
        } else if (score >= 4) {
            resMascot.innerText = "⭐";
            resTitle.innerText = "참 잘했어요!";
        } else {
            resMascot.innerText = "💡";
            resTitle.innerText = "조금 더 연습해봐요!";
        }
    }
</script>

</body>
</html>
