<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제2차 세계대전 역사 퀴즈</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --correct-color: #27ae60;
            --wrong-color: #e74c3c;
            --bg-color: #ecf0f1;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        #quiz-card {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .mascot {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        #progress-fill {
            height: 100%;
            background: var(--primary-color);
            width: 0%;
            border-radius: 4px;
            transition: width 0.3s;
        }

        .question {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            word-break: keep-all;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
            text-align: left;
        }

        .btn:disabled { cursor: default; }

        .btn.correct {
            background-color: var(--correct-color) !important;
            color: white;
            border-color: var(--correct-color);
        }

        .btn.wrong {
            background-color: var(--wrong-color) !important;
            color: white;
            border-color: var(--wrong-color);
        }

        #explanation {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 0.9rem;
            display: none;
            text-align: left;
            border-left: 5px solid var(--primary-color);
        }

        #next-btn {
            margin-top: 20px;
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            display: none;
            cursor: pointer;
        }

        .result-screen { display: none; }
        .score { font-size: 3rem; font-weight: bold; color: var(--primary-color); margin: 20px 0; }
    </style>
</head>
<body>

<div id="quiz-card">
    <div class="mascot">🔫 🚜</div>
    
    <div id="quiz-ui">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="question-num" style="font-size: 0.8rem; color: #666; margin-bottom: 5px;"></div>
        <div class="question" id="question-text"></div>
        <div class="options" id="options-container"></div>
        <div id="explanation"></div>
        <button id="next-btn" onclick="nextQuestion()">다음 문제로</button>
    </div>

    <div id="result-ui" class="result-screen">
        <h2>퀴즈 결과</h2>
        <div class="score" id="final-score"></div>
        <p id="result-comment"></p>
        <button class="btn" style="width: 100%; text-align: center; margin-top: 20px;" onclick="location.reload()">다시 시작하기</button>
    </div>
</div>

<script>
    const quizData = [
        {
            q: "제2차 세계대전의 시작을 알린 독일의 침공 국가는?",
            o: ["프랑스", "소련", "폴란드", "영국"],
            a: 2,
            e: "1939년 9월 1일 독일이 폴란드를 침공하면서 전쟁이 시작되었습니다."
        },
        {
            q: "독일, 이탈리아와 함께 '추축국'을 형성했던 아시아의 국가는?",
            o: ["중국", "일본", "인도", "베트남"],
            a: 1,
            e: "독일, 이탈리아, 일본이 삼국 동맹을 맺고 추축국 세력을 형성했습니다."
        },
        {
            q: "일본이 미국의 함대를 기습 공격하여 태평양 전쟁의 계기가 된 곳은?",
            o: ["진주만", "괌", "미드웨이", "사이판"],
            a: 0,
            e: "1941년 일본의 진주만 기습으로 미국이 연합군 측에 참전하게 됩니다."
        },
        {
            q: "연합군이 프랑스 해안에 상륙하여 반격의 기틀을 마련한 작전은?",
            o: ["인천 상륙 작전", "노르망디 상륙 작전", "독도 상륙 작전", "시칠리아 작전"],
            a: 1,
            e: "1944년 노르망디 상륙 작전의 성공으로 연합군은 파리를 탈환하고 독일로 진격했습니다."
        },
        {
            q: "당시 독일의 독재자로 나치당을 이끌었던 인물은?",
            o: ["무솔리니", "히로히토", "스탈린", "히틀러"],
            a: 3,
            e: "아돌프 히틀러는 나치즘을 내세워 독일을 전체주의 국가로 만들었습니다."
        },
        {
            q: "제2차 세계대전 중 유대인을 대량 학살한 비극적인 사건을 무엇이라 하나요?",
            o: ["홀로코스트", "르네상스", "냉전", "산업 혁명"],
            a: 0,
            e: "나치 독일에 의해 자행된 유대인 대학살을 홀로코스트라고 부릅니다."
        },
        {
            q: "독소전쟁의 전환점이 된 전투로, 독일군이 큰 패배를 당한 곳은?",
            o: ["베를린 전투", "스탈린그라드 전투", "런던 전투", "파리 전투"],
            a: 1,
            e: "스탈린그라드 전투의 패배로 독일군은 동부 전선에서 주도권을 잃었습니다."
        },
        {
            q: "제2차 세계대전 중 영국을 이끌었던 수상은?",
            o: ["루스벨트", "처칠", "드골", "트루먼"],
            a: 1,
            e: "윈스턴 처칠은 강력한 지도력으로 영국의 항전 의지를 북돋웠습니다."
        },
        {
            q: "일본의 항복을 받아내기 위해 원자폭탄이 투하된 도시는?",
            o: ["도쿄, 오사카", "히로시마, 나가사키", "교토, 나고야", "후쿠오카, 삿포로"],
            a: 1,
            e: "미국은 히로시마와 나가사키에 원자폭탄을 투하했고, 이후 일본은 무조건 항복했습니다."
        },
        {
            q: "전쟁이 끝난 후 세계 평화를 위해 설립된 국제기구는?",
            o: ["국제 연맹", "국제 연합(UN)", "유럽 연합(EU)", "유네스코"],
            a: 1,
            e: "전쟁의 비극을 반복하지 않기 위해 1945년 국제 연합(UN)이 창설되었습니다."
        }
    ];

    let currentIdx = 0;
    let score = 0;

    const qText = document.getElementById('question-text');
    const qNum = document.getElementById('question-num');
    const optionsContainer = document.getElementById('options-container');
    const nextBtn = document.getElementById('next-btn');
    const expDiv = document.getElementById('explanation');
    const progFill = document.getElementById('progress-fill');

    function showQuestion() {
        const data = quizData[currentIdx];
        qNum.innerText = `문제 ${currentIdx + 1} / ${quizData.length}`;
        qText.innerText = data.q;
        progFill.style.width = `${((currentIdx) / quizData.length) * 100}%`;
        
        optionsContainer.innerHTML = '';
        expDiv.style.display = 'none';
        nextBtn.style.display = 'none';

        data.o.forEach((opt, i) => {
            const button = document.createElement('button');
            button.className = 'btn';
            button.innerText = opt;
            button.onclick = () => selectOption(i);
            optionsContainer.appendChild(button);
        });
    }

    function selectOption(idx) {
        const data = quizData[currentIdx];
        const buttons = optionsContainer.getElementsByClassName('btn');
        
        for (let btn of buttons) btn.disabled = true;

        if (idx === data.a) {
            buttons[idx].classList.add('correct');
            score++;
        } else {
            buttons[idx].classList.add('wrong');
            buttons[data.a].classList.add('correct');
        }

        expDiv.innerText = `💡 해설: ${data.e}`;
        expDiv.style.display = 'block';
        nextBtn.style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < quizData.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-ui').style.display = 'none';
        const resultUi = document.getElementById('result-ui');
        resultUi.style.display = 'block';
        document.getElementById('final-score').innerText = `${score} / ${quizData.length}`;
        
        let comment = "";
        if (score === 10) comment = "와우! 역사 박사님이시네요! 🎖️";
        else if (score >= 7) comment = "훌륭합니다! 2차 대전에 대해 잘 알고 계시네요! 😊";
        else if (score >= 4) comment = "조금 더 공부하면 완벽해질 거예요! 💪";
        else comment = "교과서를 다시 한번 훑어볼까요? 화이팅! 📚";
        
        document.getElementById('result-comment').innerText = comment;
        progFill.style.width = '100%';
    }

    showQuestion();
</script>

</body>
</html>
