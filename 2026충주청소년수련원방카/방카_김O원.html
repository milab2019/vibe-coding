<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>충주시 퀴즈 🐰</title>

<style>

body {

    font-family: sans-serif;

    background: #f9f9ff;

    margin: 0;

    text-align: center;

}

.container {

    padding: 20px;

}

.quiz-box {

    background: white;

    border-radius: 15px;

    padding: 20px;

    margin-top: 15px;

    box-shadow: 0 4px 10px rgba(0,0,0,0.1);

}

button {

    width: 100%;

    padding: 12px;

    margin: 8px 0;

    border: none;

    border-radius: 10px;

    background: #eee;

    font-size: 16px;

}

button.correct {

    background: #4caf50;

    color: white;

}

button.wrong {

    background: #f44336;

    color: white;

}

#nextBtn {

    background: #2196f3;

    color: white;

}

.mascot {

    font-size: 50px;

}

</style>

</head>

<body>



<div class="container">

    <div class="mascot">🐰</div>

    <h2>충주시 퀴즈</h2>

    <div id="quiz" class="quiz-box"></div>

    <button id="nextBtn" onclick="nextQuestion()">다음</button>

</div>



<script>

const quizData = [

{

    question: "충주시는 어느 도에 속할까요?",

    options: ["경기도", "충청북도", "충청남도", "강원도"],

    answer: 1,

    explanation: "충주시는 충청북도에 위치합니다."

},

{

    question: "충주에 있는 유명한 호수는?",

    options: ["소양호", "충주호", "대청호", "안동호"],

    answer: 1,

    explanation: "충주호는 국내 최대 인공호수 중 하나입니다."

},

{

    question: "충주의 대표 과일은?",

    options: ["사과", "배", "포도", "감"],

    answer: 0,

    explanation: "충주는 사과 생산지로 유명합니다."

},

{

    question: "충주에 있는 고구려 유적은?",

    options: ["무령왕릉", "충주 고구려비", "불국사", "종묘"],

    answer: 1,

    explanation: "충주 고구려비는 중요한 역사 유적입니다."

},

{

    question: "충주가 포함된 산맥은?",

    options: ["태백산맥", "소백산맥", "노령산맥", "광주산맥"],

    answer: 1,

    explanation: "충주는 소백산맥 권역에 속합니다."

},

{

    question: "충주에서 열리는 유명한 축제는?",

    options: ["머드축제", "사과축제", "불꽃축제", "눈축제"],

    answer: 1,

    explanation: "충주에서는 사과축제가 열립니다."

},

{

    question: "충주의 주요 산업 중 하나는?",

    options: ["조선업", "자동차", "농업", "석유"],

    answer: 2,

    explanation: "충주는 농업이 발달한 지역입니다."

},

{

    question: "충주를 흐르는 대표 강은?",

    options: ["한강", "낙동강", "금강", "영산강"],

    answer: 0,

    explanation: "한강의 상류가 충주를 지나갑니다."

},

{

    question: "충주의 관광지로 유명한 곳은?",

    options: ["남산타워", "탄금대", "해운대", "설악산"],

    answer: 1,

    explanation: "탄금대는 충주의 대표 관광지입니다."

},

{

    question: "충주의 전통 음악과 관련된 인물은?",

    options: ["세종대왕", "우륵", "이순신", "김홍도"],

    answer: 1,

    explanation: "우륵은 가야금을 전파한 인물로 탄금대와 관련이 있습니다."

}

];



let current = 0;

let score = 0;

let answered = false;



function loadQuestion() {

    const q = quizData[current];

    const quiz = document.getElementById("quiz");

    quiz.innerHTML = `

        <h3>${current + 1}. ${q.question}</h3>

        ${q.options.map((opt, i) => 

            `<button onclick="selectAnswer(${i}, this)">${opt}</button>`

        ).join("")}

        <p id="explanation"></p>

    `;

    answered = false;

}



function selectAnswer(index, btn) {

    if (answered) return;

    answered = true;



    const q = quizData[current];

    const buttons = document.querySelectorAll("#quiz button");



    buttons.forEach((b, i) => {

        if (i === q.answer) b.classList.add("correct");

        else if (i === index) b.classList.add("wrong");

    });



    if (index === q.answer) score++;



    document.getElementById("explanation").innerText = q.explanation;

}



function nextQuestion() {

    if (!answered) return;

    current++;

    if (current < quizData.length) {

        loadQuestion();

    } else {

        showResult();

    }

}



function showResult() {

    const quiz = document.getElementById("quiz");

    quiz.innerHTML = `

        <h2>🎉 결과 🎉</h2>

        <p>${score} / ${quizData.length} 점</p>

        <p>${score >= 7 ? "잘했어요! 👍" : "다시 도전해보세요! 💪"}</p>

    `;

    document.getElementById("nextBtn").style.display = "none";

}



loadQuestion();

</script>



</body>

</html>    <p>${score >= 7 ? "잘했어요! 👍" : "다시 도전해보세요! 💪"}</p>

    `;

    document.getElementById("nextBtn").style.display = "none";

}



loadQuestion();

</script>



</body>

</html>
