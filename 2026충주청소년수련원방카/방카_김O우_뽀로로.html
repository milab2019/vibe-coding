<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>포비 퀴즈 🐻‍❄️</title>

<style>

body {

  font-family: 'Arial', sans-serif;

  margin: 0;

  padding: 20px;

  background: #f0f8ff;

  text-align: center;

}

.container {

  max-width: 500px;

  margin: auto;

  background: white;

  padding: 20px;

  border-radius: 20px;

  box-shadow: 0 4px 10px rgba(0,0,0,0.1);

}

h1 {

  font-size: 22px;

}

.mascot {

  font-size: 50px;

}

button {

  display: block;

  width: 100%;

  margin: 8px 0;

  padding: 12px;

  border: none;

  border-radius: 10px;

  background: #eee;

  font-size: 16px;

}

button.correct {

  background: #90ee90;

}

button.wrong {

  background: #ff7f7f;

}

.hidden {

  display: none;

}

#nextBtn {

  background: #4CAF50;

  color: white;

}

</style>

</head>

<body>



<div class="container">

  <div class="mascot">🐻‍❄️</div>

  <h1>포비 퀴즈</h1>

  <div id="quiz"></div>

  <div id="explanation" class="hidden"></div>

  <button id="nextBtn" class="hidden">다음 문제 ➡️</button>

  <div id="result" class="hidden"></div>

</div>



<script>

const quizData = [

  {

    question: "포비는 어떤 동물일까요?",

    options: ["북극곰", "펭귄", "여우", "사슴"],

    answer: 0,

    explanation: "포비는 따뜻한 마음을 가진 북극곰이에요!"

  },

  {

    question: "포비의 성격은?",

    options: ["소심하다", "화가 많다", "따뜻하고 친절하다", "게으르다"],

    answer: 2,

    explanation: "포비는 항상 친구들을 배려하는 따뜻한 성격이에요."

  },

  {

    question: "포비는 말을 잘 하나요?",

    options: ["잘한다", "아주 많이 한다", "거의 하지 않는다", "노래만 한다"],

    answer: 2,

    explanation: "포비는 말을 거의 하지 않고 행동으로 표현해요."

  },

  {

    question: "포비는 주로 무엇을 좋아할까요?",

    options: ["싸움", "친구들과 함께하기", "혼자 있기", "잠만 자기"],

    answer: 1,

    explanation: "포비는 친구들과 함께 있는 걸 좋아해요."

  },

  {

    question: "포비는 어떤 이미지인가요?",

    options: ["무섭다", "차갑다", "귀엽고 포근하다", "날카롭다"],

    answer: 2,

    explanation: "포비는 포근하고 귀여운 이미지예요."

  },

  {

    question: "포비는 친구들을 어떻게 대하나요?",

    options: ["무시한다", "도와준다", "피한다", "괴롭힌다"],

    answer: 1,

    explanation: "포비는 항상 친구들을 도와줘요."

  },

  {

    question: "포비의 역할은?",

    options: ["리더", "장난꾸러기", "따뜻한 조력자", "악당"],

    answer: 2,

    explanation: "포비는 친구들을 돕는 역할이에요."

  },

  {

    question: "포비는 감정 표현을 어떻게 하나요?",

    options: ["말로 한다", "행동으로 한다", "노래로 한다", "그림으로 한다"],

    answer: 1,

    explanation: "포비는 행동으로 마음을 표현해요."

  },

  {

    question: "포비는 주로 어떤 분위기를 만들까요?",

    options: ["긴장감", "웃음", "따뜻함", "혼란"],

    answer: 2,

    explanation: "포비는 따뜻한 분위기를 만들어요."

  },

  {

    question: "포비를 한마디로 표현하면?",

    options: ["차가움", "친절함", "이기적임", "소란스러움"],

    answer: 1,

    explanation: "포비는 정말 친절한 캐릭터예요!"

  }

];



let current = 0;

let score = 0;



const quizEl = document.getElementById("quiz");

const explanationEl = document.getElementById("explanation");

const nextBtn = document.getElementById("nextBtn");

const resultEl = document.getElementById("result");



function loadQuiz() {

  explanationEl.classList.add("hidden");

  nextBtn.classList.add("hidden");



  const q = quizData[current];

  quizEl.innerHTML = `<h3>${current + 1}. ${q.question}</h3>`;



  q.options.forEach((opt, i) => {

    const btn = document.createElement("button");

    btn.innerText = opt;

    btn.onclick = () => selectAnswer(btn, i);

    quizEl.appendChild(btn);

  });

}



function selectAnswer(btn, index) {

  const q = quizData[current];

  const buttons = quizEl.querySelectorAll("button");



  buttons.forEach((b, i) => {

    b.disabled = true;

    if (i === q.answer) b.classList.add("correct");

    else if (i === index) b.classList.add("wrong");

  });



  if (index === q.answer) score++;



  explanationEl.innerText = q.explanation;

  explanationEl.classList.remove("hidden");

  nextBtn.classList.remove("hidden");

}



nextBtn.onclick = () => {

  current++;

  if (current < quizData.length) {

    loadQuiz();

  } else {

    showResult();

  }

};



function showResult() {

  quizEl.classList.add("hidden");

  explanationEl.classList.add("hidden");

  nextBtn.classList.add("hidden");



  resultEl.classList.remove("hidden");

  resultEl.innerHTML = `<h2>🎉 결과 🎉</h2>

  <p>${quizData.length}문제 중 ${score}개 맞았어요!</p>

  <p>${score >= 8 ? "완전 포비 마스터! 🐻‍❄️" : "조금 더 도전해봐! 💪"}</p>`;

}



loadQuiz();

</script>



</body>

</html>
