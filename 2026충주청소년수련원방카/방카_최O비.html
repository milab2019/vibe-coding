<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>문호 스트레이독스 퀴즈 🐯✨</title>

<style>

body {

    font-family: 'Arial', sans-serif;

    background: #f5f7fb;

    margin: 0;

    padding: 0;

    text-align: center;

}

.container {

    max-width: 420px;

    margin: auto;

    padding: 20px;

}

h1 {

    font-size: 22px;

}

.question {

    font-size: 18px;

    margin: 20px 0;

}

.btn {

    display: block;

    width: 100%;

    margin: 8px 0;

    padding: 12px;

    border-radius: 10px;

    border: none;

    background: #e0e0e0;

    font-size: 16px;

}

.correct {

    background: #4CAF50 !important;

    color: white;

}

.wrong {

    background: #F44336 !important;

    color: white;

}

.explanation {

    font-size: 14px;

    margin-top: 10px;

}

.hidden {

    display: none;

}

#result {

    font-size: 20px;

    margin-top: 30px;

}

</style>

</head>

<body>

<div class="container">

<h1>문호 스트레이독스 퀴즈 🐯✨</h1>

<div id="quiz"></div>

<div id="result" class="hidden"></div>

</div>

<script>

const quizData = [

{

    question: "나카지마 아츠시의 능력은?",

    options: ["호랑이 변신", "불 조종", "시간 정지", "독 생성"],

    answer: 0,

    explanation: "아츠시는 하얀 호랑이로 변신하는 능력을 가지고 있어요 🐯"

},

{

    question: "다자이 오사무의 능력은?",

    options: ["능력 무효화", "중력 조종", "환각", "불멸"],

    answer: 0,

    explanation: "다자이는 모든 능력을 무효화합니다."

},

{

    question: "아쿠타가와의 능력 이름은?",

    options: ["라쇼몽", "월광", "빙결", "천둥"],

    answer: 0,

    explanation: "아쿠타가와의 능력은 '라쇼몽'입니다."

},

{

    question: "포트 마피아 간부는 누구?",

    options: ["아츠시", "츄야", "다자이", "후쿠자와"],

    answer: 1,

    explanation: "나카하라 츄야는 포트 마피아 간부입니다."

},

{

    question: "무장 탐정사의 사장은?",

    options: ["다자이", "아쿠타가와", "후쿠자와", "츠지무라"],

    answer: 2,

    explanation: "후쿠자와 유키치는 탐정사의 사장입니다."

},

{

    question: "아츠시가 처음 만난 탐정사는?",

    options: ["다자이", "쿠니키다", "란포", "요사노"],

    answer: 0,

    explanation: "아츠시는 처음에 다자이를 만나게 됩니다."

},

{

    question: "에도가와 란포의 능력은?",

    options: ["초추리", "투명화", "시간 이동", "독 생성"],

    answer: 0,

    explanation: "란포는 뛰어난 추리 능력을 가지고 있습니다."

},

{

    question: "요사노 아키코의 능력은?",

    options: ["치유", "불 조종", "빙결", "전기"],

    answer: 0,

    explanation: "요사노는 치유 능력을 가지고 있습니다."

},

{

    question: "다자이가 과거 속했던 조직은?",

    options: ["무장 탐정사", "포트 마피아", "정부", "길드"],

    answer: 1,

    explanation: "다자이는 과거 포트 마피아 소속이었습니다."

},

{

    question: "길드의 리더는?",

    options: ["피츠제럴드", "츄야", "란포", "아츠시"],

    answer: 0,

    explanation: "프랜시스 피츠제럴드는 길드의 리더입니다."

}

];

let current = 0;

let score = 0;

function loadQuestion() {

    const q = quizData[current];

    const quiz = document.getElementById("quiz");

    quiz.innerHTML = `

        <div class="question">${q.question}</div>

        ${q.options.map((opt, i) => 

            `<button class="btn" onclick="selectAnswer(${i})">${opt}</button>`

        ).join("")}

        <div id="explanation" class="explanation hidden"></div>

    `;

}

function selectAnswer(index) {

    const buttons = document.querySelectorAll(".btn");

    const correctIndex = quizData[current].answer;

    const explanation = document.getElementById("explanation");

    buttons.forEach((btn, i) => {

        btn.disabled = true;

        if (i === correctIndex) {

            btn.classList.add("correct");

        } else if (i === index) {

            btn.classList.add("wrong");

        }

    });

    if (index === correctIndex) score++;

    explanation.innerText = quizData[current].explanation;

    explanation.classList.remove("hidden");

    setTimeout(() => {

        current++;

        if (current < quizData.length) {

            loadQuestion();

        } else {

            showResult();

        }

    }, 1500);

}

function showResult() {

    document.getElementById("quiz").classList.add("hidden");

    const result = document.getElementById("result");

    result.classList.remove("hidden");

    result.innerHTML = `

        🐯✨ 결과 ✨🐯<br><br>

        ${score} / ${quizData.length} 점<br><br>

        ${score >= 8 ? "완전 팬 인정!" : "조금 더 도전해봐요!"}

    `;

}

loadQuestion();

</script>

</body>

</html>
