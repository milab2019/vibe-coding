<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>과자 퀴즈 🍪</title>

<style>

body {

    font-family: 'Arial', sans-serif;

    background: #fff8f0;

    text-align: center;

    margin: 0;

    padding: 0;

}

.container {

    padding: 20px;

}

h1 {

    font-size: 24px;

}

.question {

    font-size: 18px;

    margin: 20px 0;

}

button {

    display: block;

    width: 100%;

    margin: 8px 0;

    padding: 12px;

    border: none;

    border-radius: 10px;

    font-size: 16px;

    background: #eee;

}

.correct {

    background-color: #8bc34a !important;

    color: white;

}

.wrong {

    background-color: #f44336 !important;

    color: white;

}

.hidden {

    display: none;

}

#mascot {

    font-size: 50px;

}

#explanation {

    margin-top: 15px;

    font-size: 14px;

}

</style>

</head>

<body>

<div class="container">

    <div id="mascot">🍪🐻</div>

    <h1>과자 퀴즈</h1>

    <div id="quiz"></div>

    <div id="explanation"></div>

    <button id="nextBtn" class="hidden">다음 문제</button>

</div>



<script>

const quizData = [

{

q: "초코칩 쿠키의 주재료는?",

a: ["감자", "초콜릿", "치즈", "김"],

correct: 1,

ex: "초코칩 쿠키에는 초콜릿 칩이 들어갑니다."

},

{

q: "감자로 만든 과자는?",

a: ["젤리", "사탕", "포테이토칩", "초콜릿"],

correct: 2,

ex: "포테이토칩은 감자를 얇게 썰어 만든 과자입니다."

},

{

q: "젤리는 어떤 식감?",

a: ["딱딱함", "바삭함", "쫀득함", "부드러움"],

correct: 2,

ex: "젤리는 쫀득쫀득한 식감이 특징입니다."

},

{

q: "초콜릿의 주원료는?",

a: ["밀", "코코아", "쌀", "옥수수"],

correct: 1,

ex: "초콜릿은 코코아로 만듭니다."

},

{

q: "콘 과자의 주재료는?",

a: ["옥수수", "밀", "감자", "쌀"],

correct: 0,

ex: "콘 과자는 옥수수로 만듭니다."

},

{

q: "과자가 바삭한 이유는?",

a: ["물이 많아서", "기름에 튀겨서", "얼려서", "끓여서"],

correct: 1,

ex: "기름에 튀기면 바삭해집니다."

},

{

q: "사탕은 주로 무엇으로 만들까?",

a: ["설탕", "소금", "간장", "식초"],

correct: 0,

ex: "사탕은 설탕을 녹여 만듭니다."

},

{

q: "비스킷과 가장 비슷한 것은?",

a: ["쿠키", "김", "젤리", "사탕"],

correct: 0,

ex: "비스킷과 쿠키는 비슷한 종류입니다."

},

{

q: "초코파이에 들어가는 것은?",

a: ["마시멜로", "치즈", "김치", "고기"],

correct: 0,

ex: "초코파이에는 마시멜로가 들어갑니다."

},

{

q: "건강한 간식으로 비교적 좋은 것은?",

a: ["과일칩", "사탕", "초콜릿", "카라멜"],

correct: 0,

ex: "과일칩은 비교적 건강한 간식입니다."

}

];



let current = 0;

let score = 0;



const quizEl = document.getElementById("quiz");

const nextBtn = document.getElementById("nextBtn");

const explanationEl = document.getElementById("explanation");



function loadQuiz() {

    explanationEl.innerHTML = "";

    nextBtn.classList.add("hidden");



    const data = quizData[current];

    quizEl.innerHTML = `

        <div class="question">${current + 1}. ${data.q}</div>

        ${data.a.map((choice, index) =>

            `<button onclick="selectAnswer(${index})">${choice}</button>`

        ).join("")}

    `;

}



function selectAnswer(selected) {

    const buttons = document.querySelectorAll("button");

    const correct = quizData[current].correct;



    buttons.forEach((btn, idx) => {

        if (idx === correct) btn.classList.add("correct");

        else if (idx === selected) btn.classList.add("wrong");

        btn.disabled = true;

    });



    if (selected === correct) score++;



    explanationEl.innerHTML = quizData[current].ex;

    nextBtn.classList.remove("hidden");

}



nextBtn.addEventListener("click", () => {

    current++;

    if (current < quizData.length) {

        loadQuiz();

    } else {

        showResult();

    }

});



function showResult() {

    quizEl.innerHTML = `<h2>결과 🎉</h2><p>${score} / ${quizData.length} 점</p>`;

    explanationEl.innerHTML = "수고했어요! 🍪✨";

    nextBtn.style.display = "none";

}



loadQuiz();

</script>

</body>

</html>
