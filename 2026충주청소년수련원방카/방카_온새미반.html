<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도깨비 체육 퀴즈</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --correct-color: #2ecc71;
            --wrong-color: #e74c3c;
            --bg-color: #f0f3f5;
        }

        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #quiz-container {
            width: 90%;
            max-width: 500px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .mascot {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .progress {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }

        .question {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            word-break: keep-all;
        }

        .options {
            display: grid;
            gap: 10px;
        }

        button {
            padding: 15px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        .correct {
            background-color: var(--correct-color) !important;
            color: white;
            border-color: var(--correct-color) !important;
        }

        .wrong {
            background-color: var(--wrong-color) !important;
            color: white;
            border-color: var(--wrong-color) !important;
        }

        #explanation {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
            display: none;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        #next-btn, #restart-btn {
            margin-top: 20px;
            background: var(--primary-color);
            color: white;
            border: none;
            width: 100%;
            font-weight: bold;
            display: none;
        }

        .result-screen {
            display: none;
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="game-view">
        <div class="mascot">👹</div>
        <div class="progress" id="progress">문제 1 / 20</div>
        <div class="question" id="question">질문이 여기에 표시됩니다.</div>
        <div class="options" id="options">
            </div>
        <div id="explanation"></div>
        <button id="next-btn">다음 문제로!</button>
    </div>

    <div id="result-view" class="result-screen">
        <div class="mascot">🎊</div>
        <h2>퀴즈 종료!</h2>
        <p style="font-size: 1.5rem; font-weight: bold;" id="score-text"></p>
        <button id="restart-btn" style="display: block;">다시 도전하기</button>
    </div>
</div>
