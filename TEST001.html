<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>공룡 퀴즈 🦖</title>

<style>

    body {

        font-family: -apple-system, BlinkMacSystemFont, sans-serif;

        background: #f0f9ff;

        margin: 0;

        padding: 0;

        display: flex;

        justify-content: center;

    }

    .container {

        max-width: 420px;

        width: 100%;

        padding: 20px;

        box-sizing: border-box;

    }

    .card {

        background: white;

        border-radius: 16px;

        padding: 20px;

        box-shadow: 0 8px 20px rgba(0,0,0,0.08);

    }

    h1 {

        text-align: center;

        font-size: 24px;

    }

    .mascot {

        text-align: center;

        font-size: 40px;

        margin-bottom: 10px;

    }

    .question {

        font-size: 18px;

        margin-bottom: 15px;

    }

    .choices button {

        width: 100%;

        margin: 6px 0;

        padding: 12px;

        border-radius: 10px;

        border: none;

        font-size: 16px;

        background: #f1f5f9;

    }

    .choices button.correct {

        background: #bbf7d0;

    }

    .choices button.wrong {

        background: #fecaca;

    }

    .explanation {

        margin-top: 10px;

        font-size: 14px;

        color: #555;

    }

    .next-btn {

        margin-top: 15px;

        width: 100%;

        padding: 12px;

        background: #60a5fa;

        color: white;

        border: none;

        border-radius: 10px;

        font-size: 16px;

    }

    .result {

        text-align: center;

    }

</style>

</head>

<body>

<div class="container">

    <div class="card" id="app"></div>

</div>



<script>

const quiz = [

    {

        q: "티라노사우루스는 어떤 공룡인가요?",

        c: ["초식 공룡", "육식 공룡", "날아다니는 공룡", "물속 공룡"],

        a: 1,

        e: "티라노사우루스는 대표적인 육식 공룡입니다."

    },

    {

        q: "목이 긴 공룡은 무엇인가요?",

        c: ["트리케라톱스", "스테고사우루스", "브라키오사우루스", "벨로시랩터"],

        a: 2,

        e: "브라키오사우루스는 긴 목을 가진 초식 공룡입니다."

    },

    {

        q: "세 개의 뿔을 가진 공룡은?",

        c: ["트리케라톱스", "티라노사우루스", "안킬로사우루스", "디플로도쿠스"],

        a: 0,

        e: "트리케라톱스는 얼굴에 세 개의 뿔이 있습니다."

    },

    {

        q: "등에 판 모양의 돌기가 있는 공룡은?",

        c: ["스테고사우루스", "브라키오사우루스", "벨로시랩터", "알로사우루스"],

        a: 0,

        e: "스테고사우루스는 등에 큰 판이 특징입니다."

    },

    {

        q: "빠르고 똑똑한 공룡으로 알려진 것은?",

        c: ["벨로시랩터", "트리케라톱스", "스테고사우루스", "디플로도쿠스"],

        a: 0,

        e: "벨로시랩터는 빠르고 지능이 높은 공룡으로 알려져 있습니다."

    }

];



let current = 0;

let score = 0;



const app = document.getElementById("app");



function renderQuestion() {

    const q = quiz[current];

    app.innerHTML = `

        <div class="mascot">🦖</div>

        <h1>공룡 퀴즈</h1>

        <div class="question">${current + 1}. ${q.q}</div>

        <div class="choices">

            ${q.c.map((choice, i) => 

                `<button onclick="select(${i})">${choice}</button>`

            ).join("")}

        </div>

        <div id="explanation" class="explanation"></div>

        <button id="next" class="next-btn" style="display:none;" onclick="next()">다음</button>

    `;

}



function select(i) {

    const q = quiz[current];

    const buttons = document.querySelectorAll(".choices button");

    buttons.forEach((btn, idx) => {

        if (idx === q.a) btn.classList.add("correct");

        else if (idx === i) btn.classList.add("wrong");

        btn.disabled = true;

    });



    if (i === q.a) score++;



    document.getElementById("explanation").innerText = q.e;

    document.getElementById("next").style.display = "block";

}



function next() {

    current++;

    if (current < quiz.length) {

        renderQuestion();

    } else {

        renderResult();

    }

}



function renderResult() {

    app.innerHTML = `

        <div class="mascot">🎉🦕</div>

        <h1>결과</h1>

        <div class="result">

            당신의 점수는 <strong>${score} / ${quiz.length}</strong> 입니다!

        </div>

        <button class="next-btn" onclick="restart()">다시하기</button>

    `;

}



function restart() {

    current = 0;

    score = 0;

    renderQuestion();

}



renderQuestion();

</script>

</body>

</html>
