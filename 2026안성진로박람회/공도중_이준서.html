<!DOCTYPE html>

<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>스포츠 퀴즈 왕 🏆</title>

    <style>

        :root {

            --primary-color: #4a90e2;

            --success-color: #28a745;

            --error-color: #dc3545;

            --bg-color: #f0f2f5;

        }

        body {

            font-family: 'Pretendard', -apple-system, sans-serif;

            background-color: var(--bg-color);

            display: flex;

            justify-content: center;

            align-items: center;

            min-height: 100vh;

            margin: 0;

            padding: 20px;

            box-sizing: border-box;

        }

        #quiz-container {

            background: white;

            width: 100%;

            max-width: 500px;

            border-radius: 20px;

            padding: 30px;

            box-shadow: 0 10px 25px rgba(0,0,0,0.1);

            text-align: center;

        }

        .mascot {

            font-size: 3rem;

            margin-bottom: 10px;

        }

        h1 {

            font-size: 1.5rem;

            color: #333;

            margin-bottom: 20px;

        }

        .question-number {

            font-size: 0.9rem;

            color: #666;

            margin-bottom: 10px;

        }

        .question-text {

            font-size: 1.2rem;

            font-weight: bold;

            margin-bottom: 20px;

            line-height: 1.4;

        }

        .options-container {

            display: grid;

            gap: 10px;

        }

        .option-btn {

            padding: 15px;

            border: 2px solid #eee;

            border-radius: 12px;

            background: white;

            font-size: 1rem;

            cursor: pointer;

            transition: all 0.2s;

            text-align: left;

        }

        .option-btn:hover {

            border-color: var(--primary-color);

            background-color: #f8fbff;

        }

        .option-btn.correct {

            background-color: #d4edda !important;

            border-color: var(--success-color) !important;

            color: #155724;

        }

        .option-btn.incorrect {

            background-color: #f8d7da !important;

            border-color: var(--error-color) !important;

            color: #721c24;

        }

        #explanation {

            margin-top: 20px;

            padding: 15px;

            border-radius: 10px;

            background-color: #e9ecef;

            display: none;

            font-size: 0.95rem;

            line-height: 1.5;

            text-align: left;

        }

        #next-btn {

            margin-top: 20px;

            width: 100%;

            padding: 15px;

            border: none;

            border-radius: 12px;

            background-color: var(--primary-color);

            color: white;

            font-weight: bold;

            font-size: 1rem;

            display: none;

            cursor: pointer;

        }

        .result-screen {

            display: none;

        }

        .score-text {

            font-size: 2rem;

            font-weight: bold;

            color: var(--primary-color);

            margin: 20px 0;

        }

        .restart-btn {

            padding: 15px 30px;

            background-color: #333;

            color: white;

            border: none;

            border-radius: 12px;

            cursor: pointer;

        }

    </style>

</head>

<body>

<div id="quiz-container">

    <div id="game-view">

        <div class="mascot">🦁</div>

        <div class="question-number" id="q-num">문제 1/5</div>

        <div class="question-text" id="q-text">질문이 여기에 표시됩니다.</div>

        <div class="options-container" id="options">

            </div>

        <div id="explanation"></div>

        <button id="next-btn">다음 문제로 ></button>

    </div>

    <div id="result-view" class="result-screen">

        <div class="mascot">🏆</div>

        <h1>퀴즈 종료!</h1>

        <div class="score-text" id="final-score">0 / 5</div>

        <p id="result-message"></p>

        <button class="restart-btn" onclick="location.reload()">다시 도전하기</button>

    </div>

</div>

<script>

    const quizData = [

        {

            q: "축구 경기에서 정규 시간(전·후반)은 총 몇 분일까요?",

            a: ["80분", "90분", "100분", "120분"],

            correct: 1,

            exp: "축구의 정규 시간은 전반 45분, 후반 45분으로 총 90분입니다."

        },

        {

            q: "야구에서 한 이닝 동안 한 팀이 기록할 수 있는 아웃 카운트는?",

            a: ["2개", "3개", "4개", "6개"],

            correct: 1,

            exp: "각 이닝마다 공격 측은 3개의 아웃 카운트를 기록하면 공수가 교대됩니다."

        },

        {

            q: "테니스에서 '0점'을 부르는 특별한 용어는 무엇인가요?",

            a: ["제로", "널", "러브", "덕"],

            correct: 2,

            exp: "테니스에서는 0점을 '러브(Love)'라고 부릅니다. 프랑스어 l'oeuf(달걀)에서 유래했다는 설이 있습니다."

        },

        {

            q: "농구에서 3점 라인 밖에서 던진 슛이 들어가면 몇 점일까요?",

            a: ["1점", "2점", "3점", "4점"],

            correct: 2,

            exp: "3점 라인 밖에서의 슛은 3점, 라인 안쪽은 2점, 자유투는 1점입니다."

        },

        {

            q: "올림픽 상징인 오륜기에서 5개의 고리는 무엇을 의미하나요?",

            a: ["5개의 종목", "5개의 국가", "5개의 대륙", "5명의 창시자"],

            correct: 2,

            exp: "오륜기의 다섯 고리는 세계 5개 대륙(유럽, 아시아, 아프리카, 오세아니아, 아메리카)을 상징합니다."

        }

    ];

    let currentIdx = 0;

    let score = 0;

    let answered = false;

    const qNumEl = document.getElementById('q-num');

    const qTextEl = document.getElementById('q-text');

    const optionsEl = document.getElementById('options');

    const expEl = document.getElementById('explanation');

    const nextBtn = document.getElementById('next-btn');

    function loadQuestion() {

        const currentQ = quizData[currentIdx];

        answered = false;

        

        qNumEl.innerText = `문제 ${currentIdx + 1}/${quizData.length}`;

        qTextEl.innerText = currentQ.q;

        expEl.style.display = 'none';

        nextBtn.style.display = 'none';

        optionsEl.innerHTML = '';

        currentQ.a.forEach((option, i) => {

            const btn = document.createElement('button');

            btn.className = 'option-btn';

            btn.innerText = option;

            btn.onclick = () => checkAnswer(i);

            optionsEl.appendChild(btn);

        });

    }

    function checkAnswer(selectedIdx) {

        if (answered) return;

        answered = true;

        const currentQ = quizData[currentIdx];

        const buttons = optionsEl.getElementsByTagName('button');

        if (selectedIdx === currentQ.correct) {

            buttons[selectedIdx].classList.add('correct');

            score++;

        } else {

            buttons[selectedIdx].classList.add('incorrect');

            buttons[currentQ.correct].classList.add('correct');

        }

        expEl.innerText = `💡 해설: ${currentQ.exp}`;

        expEl.style.display = 'block';

        nextBtn.style.display = 'block';

        if (currentIdx === quizData.length - 1) {

            nextBtn.innerText = "결과 확인하기";

        }

    }

    nextBtn.onclick = () => {

        currentIdx++;

        if (currentIdx < quizData.length) {

            loadQuestion();

        } else {

            showResult();

        }

    };

    function showResult() {

        document.getElementById('game-view').style.display = 'none';

        const resultView = document.getElementById('result-view');

        resultView.style.display = 'block';

        document.getElementById('final-score').innerText = `${score} / ${quizData.length}`;

        

        let msg = "";

        if (score === 5) msg = "와우! 당신은 진정한 스포츠 박사군요! 🦁🔥";

        else if (score >= 3) msg = "대단해요! 스포츠를 꽤 잘 아시네요! ⚽✨";

        else msg = "조금 더 분발해볼까요? 다시 도전해보세요! 🏃‍♂️💨";

        

        document.getElementById('result-message').innerText = msg;

    }

    // 시작

    loadQuestion();

</script>

</body>

</html>
