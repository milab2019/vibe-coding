<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>게임 퀴즈 🎮</title><style>body {  font-family: 'Arial', sans-serif;  background: #fff8f0;  margin: 0;  padding: 0;  text-align: center;}.container {  padding: 20px;}.card {  background: white;  border-radius: 15px;  padding: 20px;  box-shadow: 0 4px 10px rgba(0,0,0,0.1);}button {  display: block;  width: 100%;  margin: 10px 0;  padding: 12px;  border-radius: 10px;  border: none;  font-size: 16px;}.correct { background-color: #a5f2a5 !important; }.wrong { background-color: #f7a5a5 !important; }.hidden { display: none; }.mascot {  font-size: 50px;}</style></head><body><div class="container">  <div class="mascot">🐰🎮</div>  <h2>귀여운 게임 퀴즈 💕</h2>  <div id="quiz" class="card"></div></div><script>const quizData = [  {    question: "마리오가 처음 등장한 게임은?",    options: ["슈퍼 마리오 브라더스", "동키콩", "젤다의 전설", "테트리스"],    answer: 1,    explanation: "마리오는 '동키콩'에서 처음 등장했어요! 🍌"  },  {    question: "포켓몬의 창시자는?",    options: ["미야모토 시게루", "타지리 사토시", "코지마 히데오", "요코 타로"],    answer: 1,    explanation: "타지리 사토시가 포켓몬을 만들었어요! ⚡"  },  {    question: "리그 오브 레전드의 제작사는?",    options: ["블리자드", "라이엇 게임즈", "넥슨", "EA"],    answer: 1,    explanation: "라이엇 게임즈에서 만들었답니다! 🏆"  },  {    question: "마인크래프트의 특징은?",    options: ["레이싱 게임", "블록으로 세상 만들기", "격투 게임", "퍼즐 게임"],    answer: 1,    explanation: "블록으로 자유롭게 만드는 게임이에요! ⛏️"  },  {    question: "젤다의 전설 주인공 이름은?",    options: ["젤다", "링크", "가논", "마리오"],    answer: 1,    explanation: "주인공은 링크예요! ⚔️"  }];let current = 0;let score = 0;function loadQuiz() {  const q = quizData[current];  const quiz = document.getElementById("quiz");  quiz.innerHTML = `    <h3>${current + 1}. ${q.question}</h3>    ${q.options.map((opt, i) => `<button onclick="checkAnswer(${i})">${opt}</button>`).join("")}    <p id="explanation" class="hidden"></p>  `;}function checkAnswer(selected) {  const q = quizData[current];  const buttons = document.querySelectorAll("button");  buttons.forEach((btn, i) => {    btn.disabled = true;    if (i === q.answer) btn.classList.add("correct");    if (i === selected && i !== q.answer) btn.classList.add("wrong");  });  if (selected === q.answer) score++;  const exp = document.getElementById("explanation");  exp.textContent = q.explanation;  exp.classList.remove("hidden");  setTimeout(() => {    current++;    if (current < quizData.length) {      loadQuiz();    } else {      showResult();    }  }, 1500);}function showResult() {  const quiz = document.getElementById("quiz");  quiz.innerHTML = `    <h2>🎉 결과 발표 🎉</h2>    <p>너의 점수는... <strong>${score} / ${quizData.length}</strong> 💖</p>    <p>${score === 5 ? "완벽해! 최고야! 🥰" : "조금만 더 노력해보자! 💪"}</p>    <button onclick="location.reload()">다시 하기 🔄</button>  `;}loadQuiz();</script></body></html>
