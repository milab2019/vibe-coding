<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🥋 유도 퀴즈</title>

<style>

body {

    font-family: Arial, sans-serif;

    background: #f5f7fa;

    margin: 0;

    padding: 0;

    text-align: center;

}

.container {

    padding: 20px;

}

h1 {

    font-size: 24px;

}

.mascot {

    font-size: 50px;

}

.question {

    font-size: 18px;

    margin: 20px 0;

}

button {

    display: block;

    width: 100%;

    padding: 12px;

    margin: 8px 0;

    font-size: 16px;

    border: none;

    border-radius: 10px;

    background: #e0e0e0;

}

.correct {

    background: #4caf50 !important;

    color: white;

}

.wrong {

    background: #f44336 !important;

    color: white;

}

.explanation {

    margin-top: 10px;

    font-size: 14px;

}

.hidden {

    display: none;

}

#nextBtn {

    margin-top: 15px;

    background: #2196f3;

    color: white;

}

</style>

</head>

<body>



<div class="container">

    <div class="mascot">🥋🐻</div>

    <h1>유도 퀴즈</h1>



    <div id="quiz"></div>

    <button id="nextBtn" class="hidden">다음 ➡️</button>



    <div id="result" class="hidden"></div>

</div>



<script>

const quizData = [

{

    question: "유도의 창시자는 누구인가요?",

    options: ["가노 지고로", "이순신", "브루스 리", "김연아"],

    answer: 0,

    explanation: "유도는 일본의 가노 지고로가 창시했습니다."

},

{

    question: "유도에서 상대를 메치는 기술을 무엇이라고 하나요?",

    options: ["낙법", "메치기", "조르기", "잡기"],

    answer: 1,

    explanation: "상대를 넘어뜨리는 기술을 메치기라고 합니다."

},

{

    question: "유도 경기 시간은 보통 몇 분인가요?",

    options: ["2분", "3분", "4분", "10분"],

    answer: 2,

    explanation: "일반적으로 유도 경기는 4분입니다."

},

{

    question: "유도에서 가장 높은 점수는 무엇인가요?",

    options: ["유효", "절반", "한판", "경고"],

    answer: 2,

    explanation: "한판은 경기 즉시 승리를 의미하는 최고 점수입니다."

},

{

    question: "유도복을 뭐라고 부르나요?",

    options: ["도복", "유니폼", "트레이닝복", "갑옷"],

    answer: 0,

    explanation: "유도에서 입는 옷은 도복이라고 합니다."

}

];



let current = 0;

let score = 0;



const quizEl = document.getElementById("quiz");

const nextBtn = document.getElementById("nextBtn");

const resultEl = document.getElementById("result");



function loadQuestion() {

    nextBtn.classList.add("hidden");

    const q = quizData[current];



    quizEl.innerHTML = `

        <div class="question">${current + 1}. ${q.question}</div>

        ${q.options.map((opt, i) => 

            `<button onclick="selectAnswer(${i}, this)">${opt}</button>`

        ).join("")}

        <div class="explanation hidden" id="exp">${q.explanation}</div>

    `;

}



function selectAnswer(index, btn) {

    const buttons = document.querySelectorAll("button");

    const correct = quizData[current].answer;



    buttons.forEach((b, i) => {

        b.disabled = true;

        if (i === correct) b.classList.add("correct");

        else if (i === index) b.classList.add("wrong");

    });



    if (index === correct) score++;



    document.getElementById("exp").classList.remove("hidden");

    nextBtn.classList.remove("hidden");

}



nextBtn.onclick = () => {

    current++;

    if (current < quizData.length) {

        loadQuestion();

    } else {

        showResult();

    }

};



function showResult() {

    quizEl.classList.add("hidden");

    nextBtn.classList.add("hidden");

    resultEl.classList.remove("hidden");



    resultEl.innerHTML = `

        <h2>🎉 결과 🎉</h2>

        <p>${quizData.length}문제 중 ${score}개 맞췄어요!</p>

        <div class="mascot">🥋😆</div>

    `;

}



loadQuestion();

</script>



</body>

</html>
