<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>안성 퀴즈</title>

<style>

body {

    font-family: 'Arial', sans-serif;

    margin: 0;

    background: #f5f7fb;

    text-align: center;

}

.container {

    padding: 20px;

}

.card {

    background: white;

    border-radius: 16px;

    padding: 20px;

    box-shadow: 0 4px 10px rgba(0,0,0,0.1);

}

button {

    width: 100%;

    padding: 14px;

    margin: 8px 0;

    border: none;

    border-radius: 12px;

    font-size: 16px;

}

.correct { background: #4CAF50; color: white; }

.wrong { background: #f44336; color: white; }

.default { background: #e0e0e0; }

.next-btn {

    background: #2196F3;

    color: white;

}

.mascot {

    font-size: 50px;

}

</style>

</head>

<body>

<div class="container">

    <div class="mascot">🐮</div>

    <div class="card" id="quiz"></div>

</div>

<script>

const quizData = [

    {

        question: "안성의 대표 특산물은?",

        options: ["안성 배", "안성 쌀", "안성 한우", "안성 사과"],

        answer: 2,

        explanation: "안성은 '안성맞춤 한우'로 유명합니다."

    },

    {

        question: "안성맞춤이라는 말의 뜻은?",

        options: ["대충 맞다", "완벽하게 알맞다", "조금 부족하다", "빠르게 맞다"],

        answer: 1,

        explanation: "'안성맞춤'은 완벽하게 잘 맞는다는 뜻입니다."

    },

    {

        question: "안성에 위치한 유명한 테마파크는?",

        options: ["에버랜드", "롯데월드", "안성팜랜드", "서울랜드"],

        answer: 2,

        explanation: "안성팜랜드는 가족 체험형 테마파크입니다."

    },

    {

        question: "안성이 속한 도는?",

        options: ["강원도", "충청도", "경기도", "전라도"],

        answer: 2,

        explanation: "안성시는 경기도에 위치해 있습니다."

    },

    {

        question: "안성 남사당패는 무엇과 관련이 있을까?",

        options: ["농업", "전통 공연", "건축", "무역"],

        answer: 1,

        explanation: "남사당패는 전통 유랑 공연단입니다."

    }

];

let current = 0;

let score = 0;

function loadQuiz() {

    const q = quizData[current];

    let html = `<h3>${current + 1}. ${q.question}</h3>`;

    

    q.options.forEach((opt, idx) => {

        html += `<button class="default" onclick="selectAnswer(${idx})">${opt}</button>`;

    });

    html += `<div id="explanation" style="margin-top:10px;"></div>`;

    document.getElementById("quiz").innerHTML = html;

}

function selectAnswer(idx) {

    const q = quizData[current];

    const buttons = document.querySelectorAll("button");

    buttons.forEach((btn, i) => {

        btn.disabled = true;

        if (i === q.answer) btn.classList.add("correct");

        else if (i === idx) btn.classList.add("wrong");

    });

    if (idx === q.answer) score++;

    document.getElementById("explanation").innerHTML = `<p>${q.explanation}</p>

    <button class="next-btn" onclick="nextQuestion()">다음 ➡️</button>`;

}

function nextQuestion() {

    current++;

    if (current < quizData.length) {

        loadQuiz();

    } else {

        showResult();

    }

}

function showResult() {

    document.getElementById("quiz").innerHTML = `

        <h2>🎉 결과 🎉</h2>

        <p>${score} / ${quizData.length} 점</p>

        <button class="next-btn" onclick="restart()">다시하기 🔄</button>

    `;

}

function restart() {

    current = 0;

    score = 0;

    loadQuiz();

}

loadQuiz();

</script>

</body>

</html>
