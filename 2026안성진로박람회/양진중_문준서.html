<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🕷️ 스파이더맨 퀴즈</title>

<style>

body {

    font-family: 'Arial', sans-serif;

    background: #f2f6ff;

    text-align: center;

    margin: 0;

    padding: 0;

}

.container {

    padding: 20px;

}

h1 {

    color: #d62828;

}

.question {

    font-size: 18px;

    margin: 20px 0;

}

.option {

    display: block;

    margin: 10px auto;

    padding: 12px;

    width: 90%;

    max-width: 400px;

    border-radius: 10px;

    border: none;

    background: #ffffff;

    box-shadow: 0 2px 5px rgba(0,0,0,0.1);

    cursor: pointer;

    font-size: 16px;

}

.option.correct {

    background-color: #90ee90;

}

.option.wrong {

    background-color: #ff7f7f;

}

.explanation {

    margin-top: 10px;

    font-size: 14px;

    color: #333;

}

.next-btn {

    margin-top: 20px;

    padding: 10px 20px;

    border: none;

    background: #0077ff;

    color: white;

    border-radius: 10px;

    cursor: pointer;

}

.hidden {

    display: none;

}

.mascot {

    font-size: 40px;

}

</style>

</head>

<body>



<div class="container">

    <div class="mascot">🕷️🦸‍♂️</div>

    <h1>스파이더맨 퀴즈!</h1>

    <div id="quiz"></div>

    <button id="nextBtn" class="next-btn hidden">다음 ➡️</button>

</div>



<script>

const quizData = [

    {

        question: "스파이더맨의 본명은?",

        options: ["토니 스타크", "피터 파커", "브루스 웨인", "클락 켄트"],

        answer: 1,

        explanation: "스파이더맨의 본명은 피터 파커입니다."

    },

    {

        question: "스파이더맨의 능력은 어떻게 생겼나요?",

        options: ["실험실 사고", "거미에 물림", "외계인 힘", "훈련"],

        answer: 1,

        explanation: "방사능 거미에 물려 능력을 얻었습니다."

    },

    {

        question: "스파이더맨의 상징적인 문장은?",

        options: ["나는 복수다", "큰 힘에는 큰 책임이 따른다", "절대 포기하지 마라", "정의는 승리한다"],

        answer: 1,

        explanation: "벤 삼촌의 말로 유명한 문장입니다."

    },

    {

        question: "스파이더맨의 주요 이동 방법은?",

        options: ["자동차", "비행", "웹 슈터", "텔레포트"],

        answer: 2,

        explanation: "웹 슈터로 건물 사이를 이동합니다."

    },

    {

        question: "스파이더맨이 활동하는 도시는?",

        options: ["고담시", "뉴욕", "메트로폴리스", "서울"],

        answer: 1,

        explanation: "스파이더맨은 뉴욕에서 활동합니다."

    }

];



let current = 0;

let score = 0;



const quizEl = document.getElementById("quiz");

const nextBtn = document.getElementById("nextBtn");



function loadQuestion() {

    nextBtn.classList.add("hidden");

    const q = quizData[current];

    quizEl.innerHTML = `

        <div class="question">${current + 1}. ${q.question}</div>

        ${q.options.map((opt, i) => 

            `<button class="option" onclick="selectAnswer(${i})">${opt}</button>`

        ).join('')}

        <div id="explanation" class="explanation"></div>

    `;

}



function selectAnswer(selected) {

    const buttons = document.querySelectorAll(".option");

    const correct = quizData[current].answer;



    buttons.forEach((btn, i) => {

        btn.disabled = true;

        if (i === correct) {

            btn.classList.add("correct");

        } else if (i === selected) {

            btn.classList.add("wrong");

        }

    });



    if (selected === correct) score++;



    document.getElementById("explanation").innerText = quizData[current].explanation;

    nextBtn.classList.remove("hidden");

}



nextBtn.onclick = () => {

    current++;

    if (current < quizData.length) {

        loadQuestion();

    } else {

        showResult();

    }

};



function showResult() {

    quizEl.innerHTML = `

        <h2>🎉 결과 🎉</h2>

        <p>${score} / ${quizData.length} 점</p>

        <div class="mascot">🕷️✨</div>

    `;

    nextBtn.classList.add("hidden");

}



loadQuestion();

</script>



</body>

</html>
