<!DOCTYPE html>

<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>슈퍼 마리오 퀴즈 🍄</title>

    <style>

        :root {

            --mario-red: #e52521;

            --mario-blue: #049cd8;

            --mario-yellow: #fbd000;

            --mario-green: #43b047;

            --white: #ffffff;

        }



        * { box-sizing: border-box; font-family: 'Apple SD Gothic Neo', sans-serif; }

        body { background-color: #5c94fc; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        

        #quiz-container {

            background: var(--white);

            width: 100%;

            max-width: 450px;

            border-radius: 20px;

            padding: 25px;

            box-shadow: 0 10px 0 rgba(0,0,0,0.2);

            border: 4px solid #000;

            text-align: center;

        }



        .mascot { font-size: 50px; margin-bottom: 10px; }

        h1 { color: var(--mario-red); margin: 10px 0; font-size: 24px; text-shadow: 2px 2px var(--mario-yellow); }

        

        #question-area { margin-top: 20px; }

        .question-text { font-size: 18px; font-weight: bold; margin-bottom: 20px; min-height: 50px; }



        .options { display: grid; gap: 10px; }

        .option-btn {

            padding: 15px;

            font-size: 16px;

            border: 2px solid #333;

            border-radius: 12px;

            background: var(--white);

            cursor: pointer;

            transition: transform 0.1s;

        }

        .option-btn:active { transform: scale(0.98); }



        .correct { background-color: var(--mario-green) !important; color: white; border-color: #2d7a30; }

        .wrong { background-color: var(--mario-red) !important; color: white; border-color: #a01a17; }



        #explanation {

            margin-top: 20px;

            padding: 15px;

            background: #f0f0f0;

            border-radius: 10px;

            display: none;

            font-size: 14px;

            line-height: 1.5;

        }



        #next-btn, #restart-btn {

            margin-top: 20px;

            padding: 12px 30px;

            font-size: 16px;

            background: var(--mario-blue);

            color: white;

            border: none;

            border-radius: 50px;

            cursor: pointer;

            display: none;

            width: 100%;

        }



        .hidden { display: none !important; }

        #result-screen h2 { font-size: 30px; margin-bottom: 10px; }

        .score { font-size: 24px; font-weight: bold; color: var(--mario-blue); }

    </style>

</head>

<body>



<div id="quiz-container">

    <div id="game-screen">

        <div class="mascot">🍄</div>

        <div id="progress">1 / 5</div>

        <div id="question-area">

            <div class="question-text" id="question">문제를 불러오는 중...</div>

            <div class="options" id="options-container"></div>

        </div>

        <div id="explanation"></div>

        <button id="next-btn" onclick="nextQuestion()">다음 문제로 👉</button>

    </div>



    <div id="result-screen" class="hidden">

        <div class="mascot">🌟</div>

        <h2>모험 종료!</h2>

        <p class="score" id="final-score"></p>

        <p id="result-msg"></p>

        <button id="restart-btn" style="display: block;" onclick="restartGame()">다시 도전하기 🔄</button>

    </div>

</div>



<script>

    const questions = [

        {

            q: "마리오의 직업은 무엇일까요?",

            a: ["요리사", "배관공", "경찰관", "목수"],

            correct: 1,

            exp: "마리오는 뉴욕의 하수구를 누비던 전설적인 배관공입니다!"

        },

        {

            q: "마리오의 동생 이름은 무엇일까요?",

            a: ["와리오", "와루이지", "루이지", "쿠파"],

            correct: 2,

            exp: "초록색 모자를 쓴 겁 많은 동생은 루이지입니다."

        },

        {

            q: "마리오가 먹으면 몸이 커지는 아이템은?",

            a: ["슈퍼 버섯", "파이어 플라워", "슈퍼 스타", "1UP 버섯"],

            correct: 0,

            exp: "슈퍼 버섯을 먹으면 '슈퍼 마리오'로 변신하며 몸이 커집니다."

        },

        {

            q: "마리오 시리즈의 주요 배경이 되는 왕국은?",

            a: ["하이랄 왕국", "버섯 왕국", "드림랜드", "쿠파 성"],

            correct: 1,

            exp: "피치 공주가 다스리는 버섯 왕국이 주 무대입니다."

        },

        {

            q: "마리오의 라이벌이자 거북이 왕의 이름은?",

            a: ["킹부끄", "와리오", "동키콩", "쿠파"],

            correct: 3,

            exp: "쿠파(Bowser)는 마리오의 영원한 숙적입니다."

        }

    ];



    let currentIdx = 0;

    let score = 0;

    let answered = false;



    const qText = document.getElementById('question');

    const optContainer = document.getElementById('options-container');

    const expBox = document.getElementById('explanation');

    const nextBtn = document.getElementById('next-btn');

    const progress = document.getElementById('progress');



    function loadQuestion() {

        answered = false;

        const current = questions[currentIdx];

        qText.innerText = current.q;

        progress.innerText = `${currentIdx + 1} / ${questions.length}`;

        optContainer.innerHTML = '';

        expBox.style.display = 'none';

        nextBtn.style.display = 'none';



        current.a.forEach((opt, i) => {

            const btn = document.createElement('button');

            btn.className = 'option-btn';

            btn.innerText = opt;

            btn.onclick = () => checkAnswer(i, btn);

            optContainer.appendChild(btn);

        });

    }



    function checkAnswer(idx, btn) {

        if(answered) return;

        answered = true;



        const correctIdx = questions[currentIdx].correct;

        const buttons = optContainer.querySelectorAll('.option-btn');



        if(idx === correctIdx) {

            btn.classList.add('correct');

            score++;

        } else {

            btn.classList.add('wrong');

            buttons[correctIdx].classList.add('correct');

        }



        expBox.innerText = questions[currentIdx].exp;

        expBox.style.display = 'block';

        nextBtn.style.display = 'block';

        

        if(currentIdx === questions.length - 1) {

            nextBtn.innerText = "결과 보기 🏁";

        }

    }



    function nextQuestion() {

        currentIdx++;

        if(currentIdx < questions.length) {

            loadQuestion();

        } else {

            showResult();

        }

    }



    function showResult() {

        document.getElementById('game-screen').classList.add('hidden');

        document.getElementById('result-screen').classList.remove('hidden');

        document.getElementById('final-score').innerText = `${questions.length}문제 중 ${score}문제 정답!`;

        

        let msg = "";

        if(score === 5) msg = "당신은 진정한 마리오 마스터! 👑";

        else if(score >= 3) msg = "훌륭해요! 버섯 왕국의 시민 자격이 있네요! ⭐";

        else msg = "조금 더 모험이 필요해 보여요! 🐢";

        document.getElementById('result-msg').innerText = msg;

    }



    function restartGame() {

        currentIdx = 0;

        score = 0;

        document.getElementById('game-screen').classList.remove('hidden');

        document.getElementById('result-screen').classList.add('hidden');

        nextBtn.innerText = "다음 문제로 👉";

        loadQuestion();

    }



    loadQuestion();

</script>



</body>

</html>
