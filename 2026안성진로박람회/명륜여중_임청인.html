

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>만들기 퀴즈 봇</title>
    <style>
        :root {
            --primary: #85d8ce;
            --secondary: #fcdb6b;
            --correct: #a3d9a5;
            --wrong: #ffb3b3;
            --text: #333;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f0f9f8;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
        }

        #quiz-container {
            background: white;
            width: 90%;
            max-width: 400px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        .mascot {
            font-size: 50px;
            margin-bottom: 10px;
        }

        h1 { font-size: 24px; margin-bottom: 10px; }
        
        #progress {
            font-size: 14px;
            color: #888;
            margin-bottom: 20px;
        }

        .question {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            min-height: 50px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            text-align: left;
        }

        .option-btn:hover { background-color: #e2e6ea; }
        
        .option-btn.correct {
            background-color: var(--correct);
            border-color: #82c91e;
        }

        .option-btn.wrong {
            background-color: var(--wrong);
            border-color: #f03e3e;
        }

        #explanation {
            margin-top: 20px;
            padding: 15px;
            background-color: #fff3bf;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }

        #next-btn, #restart-btn {
            margin-top: 20px;
            padding: 12px 24px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            display: none;
        }

        #result-area { display: none; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div class="mascot">🛠️</div>
    <div id="quiz-area">
        <div id="progress"></div>
        <div class="question" id="question"></div>
        <div class="options" id="options"></div>
        <div id="explanation"></div>
        <button id="next-btn" onclick="nextQuestion()">다음 문제</button>
    </div>
    
    <div id="result-area">
        <h1>퀴즈 완료!</h1>
        <p id="score" style="font-size: 24px; font-weight: bold;"></p>
        <button id="restart-btn" onclick="location.reload()" style="display:inline-block;">다시 하기</button>
    </div>
</div>

<script>
    const quizData = [
        {
            q: "종이배를 만들 때 가장 먼저 해야 할 행동은?",
            a: ["풀칠하기", "종이 접기", "가위로 자르기", "그림 그리기"],
            c: 1,
            e: "종이배는 접어서 만드는 것이 기본입니다! ⛵"
        },
        {
            q: "찰흙으로 입체적인 모형을 만들 때 쓰는 기술은?",
            a: ["조소", "데생", "판화", "수채화"],
            c: 0,
            e: "찰흙을 빚어 입체로 만드는 것은 조소입니다. 🗿"
        },
        {
            q: "간단한 로봇을 만들기 위해 필요한 재료가 아닌 것은?",
            a: ["모터", "건전지", "스위치", "분수대"],
            c: 3,
            e: "로봇을 만들 땐 전기가 필요하지만 분수대는 필요 없죠! 🤖"
        },
        {
            q: "3D 프린터로 물건을 만드는 과정을 무엇이라 하는가?",
            a: ["적층 조형", "자수", "주조", "압축"],
            c: 0,
            e: "3D 프린터는 재료를 얇게 쌓아서(적층) 만듭니다. 🖨️"
        },
        {
            q: "나무로 만든 물건을 마무리할 때 표면을 부드럽게 하는 도구는?",
            a: ["망치", "사포", "톱", "드라이버"],
            c: 1,
            e: "사포(샌드페이퍼)로 문질러야 부드러워져요! 🪵"
        }
    ];

    let currentQ = 0;
    let score = 0;
    let canAnswer = true;

    function loadQuiz() {
        canAnswer = true;
        const q = quizData[currentQ];
        document.getElementById('progress').innerText = `${currentQ + 1} / ${quizData.length}`;
        document.getElementById('question').innerText = q.q;
        document.getElementById('explanation').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        q.a.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(idx) {
        if (!canAnswer) return;
        canAnswer = false;
        
        const q = quizData[currentQ];
        const buttons = document.querySelectorAll('.option-btn');
        const explanation = document.getElementById('explanation');
        
        if (idx === q.c) {
            buttons[idx].classList.add('correct');
            score++;
        } else {
            buttons[idx].classList.add('wrong');
            buttons[q.c].classList.add('correct');
        }
        
        explanation.innerText = "💡 해설: " + q.e;
        explanation.style.display = 'block';
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQuestion() {
        currentQ++;
        if (currentQ < quizData.length) {
            loadQuiz();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        document.getElementById('score').innerText = `${quizData.length}문제 중 ${score}문제 맞혔어요! 🎉`;
    }

    loadQuiz();
</script>

</body>
</html>
