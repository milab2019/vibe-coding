<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎮 게임 미니 앱</title>

<style>

    body {

        margin: 0;

        font-family: 'Arial', sans-serif;

        background: linear-gradient(135deg, #667eea, #764ba2);

        display: flex;

        justify-content: center;

        align-items: center;

        height: 100vh;

        color: #333;

    }

    .app {

        background: white;

        border-radius: 20px;

        padding: 20px;

        width: 90%;

        max-width: 420px;

        text-align: center;

        box-shadow: 0 10px 25px rgba(0,0,0,0.25);

    }

    h1 {

        margin-top: 0;

    }

    button {

        background: #ff9a9e;

        border: none;

        padding: 15px;

        margin: 10px;

        border-radius: 12px;

        font-size: 16px;

        color: white;

        cursor: pointer;

        transition: 0.2s;

        width: 80%;

    }

    button:hover {

        background: #ff6a88;

    }

    .result {

        font-size: 22px;

        margin-top: 20px;

        min-height: 40px;

    }

    .footer {

        margin-top: 20px;

        font-size: 13px;

        color: gray;

    }

</style>

</head>

<body>



<div class="app">

    <h1>🎮 게임 선택 & 운 테스트</h1>

    <p>버튼을 눌러 오늘의 게임과 운을 확인해보세요!</p>



    <button onclick="pickGame()">🎲 게임 추천 받기</button>

    <button onclick="checkLuck()">🍀 오늘의 운 테스트</button>



    <div class="result" id="result">👉 결과가 여기에 나와요!</div>



    <div class="footer">

        👤 이름: 신영근 <br>

        🏫 학교: 삼선중

    </div>

</div>



<script>

const games = [

    "⚔️ RPG 게임",

    "🚗 레이싱 게임",

    "🔫 FPS 게임",

    "🧩 퍼즐 게임",

    "🏀 스포츠 게임",

    "👾 레트로 게임",

    "🧙‍♂️ 판타지 게임",

    "🎯 슈팅 게임"

];



const lucks = [

    "🔥 완전 대박! 오늘은 게임 천재!",

    "😎 꽤 좋은 날! 승리 가능!",

    "🙂 평범한 날! 연습하기 좋아요",

    "😅 살짝 운이 부족... 그래도 도전!",

    "💀 오늘은 쉬는 게 좋을지도..."

];



function pickGame() {

    const randomIndex = Math.floor(Math.random() * games.length);

    document.getElementById("result").innerHTML =

        "🎮 추천 게임:<br><b>" + games[randomIndex] + "</b>";

}



function checkLuck() {

    const randomIndex = Math.floor(Math.random() * lucks.length);

    document.getElementById("result").innerHTML =

        "🍀 오늘의 운:<br><b>" + lucks[randomIndex] + "</b>";

}

</script>



</body>

</html>
